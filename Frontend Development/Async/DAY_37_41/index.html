<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Profile Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-5xl">

    <!-- Heading -->
    <div class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-bold tracking-tight">
        GitHub Profile Finder
      </h1>
      <p class="text-gray-400 mt-3 text-lg">
        Search any GitHub user and view their profile details
      </p>
    </div>

    <!-- Search Box -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-xl">
      <div class="flex flex-col md:flex-row gap-4">
        <input 
          type="text" 
          placeholder="Enter GitHub username..."
          class="usernameinp flex-1 bg-gray-800 border border-gray-700 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-white placeholder-gray-400"
        />

        <button class="Search bg-indigo-600 hover:bg-indigo-500 transition-all duration-300 px-6 py-3 rounded-xl font-medium shadow-lg">
          Search
        </button>
      </div>
    </div>

    <!-- Profile Card -->
    <div class="card mt-10 bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-xl">

      <!-- Default State  -->
      <div class="text-center py-10">
        <p class="text-gray-400 text-lg">Search a GitHub username to see profile</p>
      </div>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
